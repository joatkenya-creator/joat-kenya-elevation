<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Build Your First AI Chatbot — 7-Step Guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%"><stop offset="0%" stop-color="#e7c97a" stop-opacity="0.28"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="290" rx="420" ry="260" fill="url(#glow)"/>
  <!-- Large chat bubble (left) -->
  <g transform="translate(440, 290)">
    <rect x="-180" y="-100" width="360" height="200" rx="40" fill="#0d1320" stroke="url(#ag)" stroke-width="3.5"/>
    <path d="M -120 100 L -100 140 L -60 100 Z" fill="#0d1320" stroke="url(#ag)" stroke-width="3.5" stroke-linejoin="round"/>
    <g transform="translate(-80, -20)" fill="#e7c97a"><circle cx="0" cy="0" r="6"/><circle cx="40" cy="0" r="6"/><circle cx="80" cy="0" r="6"/></g>
  </g>
  <!-- Small AI bot avatar (right) -->
  <g transform="translate(840, 290)">
    <rect x="-70" y="-80" width="140" height="120" rx="18" fill="#0d1320" stroke="url(#ag)" stroke-width="3"/>
    <rect x="-50" y="-60" width="100" height="78" rx="6" fill="url(#ag)" opacity="0.12"/>
    <circle cx="-25" cy="-20" r="9" fill="#e7c97a"/>
    <circle cx="25" cy="-20" r="9" fill="#e7c97a"/>
    <path d="M -20 10 Q 0 22 20 10" stroke="#e7c97a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="-100" x2="0" y2="-80" stroke="url(#ag)" stroke-width="3"/>
    <circle cx="0" cy="-104" r="5" fill="#d63c2c"/>
  </g>
  <g transform="translate(60, 60)"><rect width="240" height="44" rx="22" fill="#e7c97a"/><text x="120" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">AI · CHATBOT</text></g>
  <g transform="translate(1080, 60)"><rect width="60" height="44" rx="22" fill="#d63c2c"/><text x="30" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">7</text></g>
</svg>
