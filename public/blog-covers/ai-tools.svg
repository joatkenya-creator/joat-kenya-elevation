<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="15 AI tools small businesses should use">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#e7c97a" stop-opacity="0.28"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="360" fill="url(#glow)"/>
  <!-- Connecting lines from center to surrounding nodes -->
  <g stroke="url(#ag)" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="600" y1="315" x2="320" y2="160"/>
    <line x1="600" y1="315" x2="240" y2="315"/>
    <line x1="600" y1="315" x2="320" y2="470"/>
    <line x1="600" y1="315" x2="880" y2="160"/>
    <line x1="600" y1="315" x2="960" y2="315"/>
    <line x1="600" y1="315" x2="880" y2="470"/>
    <line x1="600" y1="315" x2="600" y2="100"/>
    <line x1="600" y1="315" x2="600" y2="530"/>
  </g>
  <!-- Central AI hub -->
  <g transform="translate(600, 315)">
    <circle r="110" fill="none" stroke="url(#ag)" stroke-width="1" opacity="0.2"/>
    <circle r="90" fill="none" stroke="url(#ag)" stroke-width="1.5" opacity="0.4"/>
    <circle r="70" fill="#0d1320" stroke="url(#ag)" stroke-width="3.5"/>
    <circle r="70" fill="url(#ag)" opacity="0.18"/>
    <text x="0" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" fill="#e7c97a" text-anchor="middle" letter-spacing="2">AI</text>
  </g>
  <!-- Surrounding tool nodes (8 tools) -->
  <g>
    <!-- Top-left: Writing -->
    <g transform="translate(320, 160)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g transform="translate(-14, -16)" stroke="url(#ag)" stroke-width="2" fill="none"><path d="M 0 0 L 22 0 L 30 8 L 30 32 L 0 32 Z"/><line x1="6" y1="10" x2="22" y2="10"/><line x1="6" y1="18" x2="20" y2="18"/></g>
    </g>
    <!-- Left: Design -->
    <g transform="translate(240, 315)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g transform="translate(0, 0)" stroke="url(#ag)" stroke-width="2.5" fill="none"><rect x="-16" y="-16" width="32" height="32" rx="4"/><circle cx="-7" cy="-7" r="3" fill="#e7c97a"/><path d="M -16 12 L -4 0 L 8 8 L 16 0"/></g>
    </g>
    <!-- Bottom-left: Marketing -->
    <g transform="translate(320, 470)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round"><path d="M -14 8 L -6 -10 L 2 4 L 14 -14"/><polyline points="6,-14 14,-14 14,-6"/></g>
    </g>
    <!-- Top-right: Code -->
    <g transform="translate(880, 160)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="-14,-10 -22,0 -14,10"/><polyline points="14,-10 22,0 14,10"/><line x1="-2" y1="-12" x2="-8" y2="14"/></g>
    </g>
    <!-- Right: Operations -->
    <g transform="translate(960, 315)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round"><circle cx="0" cy="0" r="12"/><line x1="0" y1="-20" x2="0" y2="-14"/><line x1="0" y1="14" x2="0" y2="20"/><line x1="-20" y1="0" x2="-14" y2="0"/><line x1="14" y1="0" x2="20" y2="0"/></g>
    </g>
    <!-- Bottom-right: Support -->
    <g transform="translate(880, 470)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M -16 -10 L 16 -10 L 16 8 L 4 8 L -4 16 L -4 8 L -16 8 Z"/></g>
    </g>
    <!-- Top: Notes/Mtg -->
    <g transform="translate(600, 100)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round"><circle cx="0" cy="-2" r="9"/><path d="M -16 18 Q 0 6 16 18"/></g>
    </g>
    <!-- Bottom: Productivity -->
    <g transform="translate(600, 530)">
      <circle r="44" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
      <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round"><polyline points="-12,-4 -4,4 14,-12"/></g>
    </g>
  </g>
  <!-- Badges -->
  <g transform="translate(60, 60)">
    <rect width="180" height="44" rx="22" fill="#e7c97a"/>
    <text x="90" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">AI · TOOLS</text>
  </g>
  <g transform="translate(1040, 60)">
    <rect width="100" height="44" rx="22" fill="#0d1320" stroke="url(#ag)" stroke-width="2"/>
    <text x="50" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#e7c97a" text-anchor="middle" letter-spacing="1">15</text>
  </g>
</svg>
