    <rect x="-50" y="-198" width="100" height="34" rx="6" fill="url(#ag)"/>
    <!-- Checklist items -->
    <g stroke="url(#ag)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g transform="translate(-110, -130)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <polyline points="4,11 10,16 18,5" stroke="#e7c97a" stroke-width="3"/>
        <line x1="36" y1="11" x2="200" y2="11" opacity="0.55"/>
      </g>
      <g transform="translate(-110, -88)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <polyline points="4,11 10,16 18,5" stroke="#e7c97a" stroke-width="3"/>
        <line x1="36" y1="11" x2="200" y2="11" opacity="0.55"/>
      </g>
      <g transform="translate(-110, -46)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <polyline points="4,11 10,16 18,5" stroke="#e7c97a" stroke-width="3"/>
        <line x1="36" y1="11" x2="180" y2="11" opacity="0.55"/>
      </g>
      <g transform="translate(-110, -4)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <polyline points="4,11 10,16 18,5" stroke="#e7c97a" stroke-width="3"/>
        <line x1="36" y1="11" x2="200" y2="11" opacity="0.55"/>
      </g>
      <g transform="translate(-110, 38)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <line x1="36" y1="11" x2="160" y2="11" opacity="0.45"/>
      </g>
      <g transform="translate(-110, 80)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <line x1="36" y1="11" x2="200" y2="11" opacity="0.45"/>
      </g>
      <g transform="translate(-110, 122)">
        <rect x="0" y="0" width="22" height="22" rx="4"/>
        <line x1="36" y1="11" x2="170" y2="11" opacity="0.45"/>
      </g>
    </g>
  </g>
  <g transform="translate(60, 60)"><rect width="280" height="44" rx="22" fill="#e7c97a"/><text x="140" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">PARTNER · CHECKLIST</text></g>
  <g transform="translate(1080, 60)"><rect width="60" height="44" rx="22" fill="#d63c2c"/><text x="30" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">15</text></g>
</svg>
