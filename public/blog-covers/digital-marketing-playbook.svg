<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Digital Marketing for Small Business — Complete 2026 Playbook">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#e7c97a" stop-opacity="0.25"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow)"/>
  <!-- Subtle grid -->
  <g stroke="#d4b157" stroke-width="0.5" opacity="0.08" fill="none">
    <path d="M 200 480 L 1000 480 M 200 380 L 1000 380 M 200 280 L 1000 280 M 200 180 L 1000 180"/>
  </g>
  <!-- Growth bar chart with rising bars -->
  <g transform="translate(380, 480)">
    <rect x="0" y="-80" width="48" height="80" rx="3" fill="#d4b157" opacity="0.75"/>
    <rect x="68" y="-140" width="48" height="140" rx="3" fill="#d4b157" opacity="0.85"/>
    <rect x="136" y="-200" width="48" height="200" rx="3" fill="#d63c2c"/>
    <rect x="204" y="-260" width="48" height="260" rx="3" fill="url(#ag)"/>
    <rect x="272" y="-320" width="48" height="320" rx="3" fill="url(#ag)"/>
  </g>
  <!-- Megaphone -->
  <g transform="translate(820, 280)">
    <path d="M -50 -30 L 30 -60 L 30 60 L -50 30 Z" fill="#0d1320" stroke="url(#ag)" stroke-width="3" stroke-linejoin="round"/>
    <rect x="30" y="-30" width="36" height="60" rx="6" fill="#d63c2c" stroke="url(#ag)" stroke-width="3"/>
    <g stroke="url(#ag)" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="80" y1="-50" x2="106" y2="-65"/>
      <line x1="80" y1="0" x2="110" y2="0"/>
      <line x1="80" y1="50" x2="106" y2="65"/>
    </g>
  </g>
  <!-- Trending arrow up-right -->
  <g stroke="url(#ag)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="350,440 460,360 540,400 680,260"/>
    <polyline points="630,250 690,250 690,310"/>
  </g>
  <g transform="translate(60, 60)"><rect width="320" height="44" rx="22" fill="#e7c97a"/><text x="160" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">MARKETING · PLAYBOOK</text></g>
  <g transform="translate(1080, 60)"><rect width="60" height="44" rx="22" fill="#d63c2c"/><text x="30" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">2026</text></g>
</svg>
