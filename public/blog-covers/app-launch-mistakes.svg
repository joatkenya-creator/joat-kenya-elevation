<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="10 Mistakes That Kill Mobile Apps Before Launch">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%"><stop offset="0%" stop-color="#d63c2c" stop-opacity="0.22"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="290" rx="500" ry="280" fill="url(#glow)"/>
  <!-- Big phone with red warning -->
  <g transform="translate(600, 315)">
    <rect x="-110" y="-180" width="220" height="360" rx="28" fill="#0d1320" stroke="url(#ag)" stroke-width="4"/>
    <rect x="-94" y="-156" width="188" height="296" rx="8" fill="url(#ag)" opacity="0.10"/>
    <line x1="-26" y1="-168" x2="26" y2="-168" stroke="#d4b157" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Warning triangle inside phone -->
    <g transform="translate(0, -10)">
      <polygon points="0,-60 60,40 -60,40" fill="#d63c2c" stroke="#e7c97a" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="0" y1="-30" x2="0" y2="10" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <circle cx="0" cy="28" r="4" fill="#ffffff"/>
    </g>
    <text x="0" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e7c97a" text-anchor="middle" letter-spacing="2">LAUNCH RISK</text>
  </g>
  <!-- Decorative warning circles around phone -->
  <g fill="#d63c2c" opacity="0.5">
    <circle cx="280" cy="200" r="6"/><circle cx="250" cy="380" r="5"/><circle cx="320" cy="460" r="6"/>
    <circle cx="920" cy="180" r="5"/><circle cx="950" cy="380" r="6"/><circle cx="880" cy="450" r="5"/>
  </g>
  <g transform="translate(60, 60)"><rect width="280" height="44" rx="22" fill="#e7c97a"/><text x="140" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">APP · MISTAKES</text></g>
  <g transform="translate(1080, 60)"><rect width="60" height="44" rx="22" fill="#d63c2c"/><text x="30" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">10</text></g>
</svg>
