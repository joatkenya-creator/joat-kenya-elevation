<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AI for Small Business — Complete Implementation Guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#e7c97a" stop-opacity="0.28"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="360" fill="url(#glow)"/>
  <!-- Central AI brain hexagon -->
  <g transform="translate(600, 315)">
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="#0d1320" stroke="url(#ag)" stroke-width="3.5"/>
    <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="url(#ag)" opacity="0.15"/>
    <text x="0" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" fill="#e7c97a" text-anchor="middle" letter-spacing="2">AI</text>
  </g>
  <!-- Four-stage implementation cycle around the hub -->
  <g stroke="url(#ag)" stroke-width="1.5" opacity="0.4" fill="none">
    <line x1="600" y1="315" x2="280" y2="160"/>
    <line x1="600" y1="315" x2="920" y2="160"/>
    <line x1="600" y1="315" x2="280" y2="470"/>
    <line x1="600" y1="315" x2="920" y2="470"/>
  </g>
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e7c97a" text-anchor="middle">
    <g transform="translate(280, 160)"><circle r="52" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/><text y="6">PLAN</text></g>
    <g transform="translate(920, 160)"><circle r="52" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/><text y="6">PICK</text></g>
    <g transform="translate(280, 470)"><circle r="52" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/><text y="6">BUILD</text></g>
    <g transform="translate(920, 470)"><circle r="52" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/><text y="6">MEASURE</text></g>
  </g>
  <g transform="translate(60, 60)"><rect width="320" height="44" rx="22" fill="#e7c97a"/><text x="160" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">AI · IMPLEMENTATION</text></g>
  <g transform="translate(1080, 60)"><rect width="60" height="44" rx="22" fill="#d63c2c"/><text x="30" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">2026</text></g>
</svg>
