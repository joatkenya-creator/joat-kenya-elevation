<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Build an MVP in 90 Days — Founder's Playbook">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#e7c97a" stop-opacity="0.22"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow)"/>
  <!-- Timeline track -->
  <line x1="180" y1="350" x2="1020" y2="350" stroke="url(#ag)" stroke-width="3" opacity="0.4"/>
  <!-- Three milestone circles -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <g transform="translate(250, 350)">
      <circle r="56" fill="#0d1320" stroke="url(#ag)" stroke-width="3.5"/>
      <text y="-4" font-size="22" font-weight="800" fill="#e7c97a">30</text>
      <text y="22" font-size="11" font-weight="600" fill="#e7c97a">DAYS</text>
      <text y="100" font-size="14" font-weight="700" fill="#e7c97a">DESIGN</text>
    </g>
    <g transform="translate(600, 350)">
      <circle r="68" fill="#0d1320" stroke="url(#ag)" stroke-width="4"/>
      <circle r="60" fill="url(#ag)" opacity="0.15"/>
      <text y="-4" font-size="28" font-weight="900" fill="#e7c97a">60</text>
      <text y="24" font-size="12" font-weight="700" fill="#e7c97a">DAYS</text>
      <text y="115" font-size="14" font-weight="700" fill="#e7c97a">BUILD</text>
    </g>
    <g transform="translate(950, 350)">
      <circle r="56" fill="#0d1320" stroke="url(#ag)" stroke-width="3.5"/>
      <text y="-4" font-size="22" font-weight="800" fill="#e7c97a">90</text>
      <text y="22" font-size="11" font-weight="600" fill="#e7c97a">DAYS</text>
      <text y="100" font-size="14" font-weight="700" fill="#e7c97a">LAUNCH</text>
    </g>
  </g>
  <!-- Rocket icon top -->
  <g transform="translate(600, 180)" fill="none" stroke="url(#ag)" stroke-width="3" stroke-linejoin="round">
    <path d="M -20 0 Q -20 -40 0 -50 Q 20 -40 20 0 L 20 30 L -20 30 Z" fill="#0d1320"/>
    <circle cx="0" cy="-20" r="6" fill="#d63c2c" stroke="none"/>
    <path d="M -20 10 L -36 30 L -20 30" fill="#d63c2c" stroke="none"/>
    <path d="M 20 10 L 36 30 L 20 30" fill="#d63c2c" stroke="none"/>
  </g>
  <g transform="translate(60, 60)"><rect width="280" height="44" rx="22" fill="#e7c97a"/><text x="140" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">MVP · PLAYBOOK</text></g>
  <g transform="translate(1060, 60)"><rect width="80" height="44" rx="22" fill="#d63c2c"/><text x="40" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">90 DAY</text></g>
</svg>
