<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-label="How to Run Profitable Meta Ads on a Tight Budget">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a2236"/><stop offset="100%" stop-color="#0d1320"/></linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e7c97a"/><stop offset="100%" stop-color="#d63c2c"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#e7c97a" stop-opacity="0.22"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow)"/>
  <!-- Stylized target with $ sign -->
  <g transform="translate(420, 315)">
    <circle r="140" fill="none" stroke="url(#ag)" stroke-width="3" opacity="0.4"/>
    <circle r="100" fill="none" stroke="url(#ag)" stroke-width="3" opacity="0.6"/>
    <circle r="60" fill="none" stroke="url(#ag)" stroke-width="3" opacity="0.8"/>
    <circle r="26" fill="#d63c2c"/>
    <text y="10" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#ffffff" text-anchor="middle">$</text>
    <!-- Arrow hitting target -->
    <line x1="-160" y1="-160" x2="-22" y2="-22" stroke="url(#ag)" stroke-width="4" stroke-linecap="round"/>
    <polygon points="-30,-10 -22,-22 -10,-30" fill="url(#ag)"/>
  </g>
  <!-- Coin stack growing -->
  <g transform="translate(820, 470)">
    <ellipse cx="0" cy="0" rx="60" ry="14" fill="#0d1320" stroke="url(#ag)" stroke-width="2.5"/>
    <ellipse cx="0" cy="-22" rx="60" ry="14" fill="url(#ag)" opacity="0.65"/>
    <ellipse cx="0" cy="-44" rx="60" ry="14" fill="url(#ag)" opacity="0.75"/>
    <ellipse cx="0" cy="-66" rx="60" ry="14" fill="#e7c97a"/>
    <ellipse cx="0" cy="-92" rx="50" ry="12" fill="#d63c2c"/>
    <ellipse cx="0" cy="-115" rx="40" ry="11" fill="url(#ag)"/>
  </g>
  <!-- Trending arrow -->
  <g stroke="url(#ag)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="720,180 800,140 880,180 1000,100"/>
    <polyline points="960,98 1010,90 1010,140"/>
  </g>
  <g transform="translate(60, 60)"><rect width="280" height="44" rx="22" fill="#e7c97a"/><text x="140" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0d1320" text-anchor="middle" letter-spacing="3">META · ADS</text></g>
  <g transform="translate(1060, 60)"><rect width="80" height="44" rx="22" fill="#d63c2c"/><text x="40" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">BUDGET</text></g>
</svg>
